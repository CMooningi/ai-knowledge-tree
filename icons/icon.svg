<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f"/>
      <stop offset="100%" style="stop-color:#1a7f5a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <!-- tree icon -->
  <g transform="translate(64,80)" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round">
    <!-- trunk -->
    <line x1="0" y1="0" x2="0" y2="-28"/>
    <!-- branches -->
    <line x1="0" y1="-28" x2="-20" y2="-54"/>
    <line x1="0" y1="-28" x2="20" y2="-54"/>
    <!-- sub-branches -->
    <line x1="-20" y1="-54" x2="-32" y2="-72"/>
    <line x1="-20" y1="-54" x2="-8" y2="-72"/>
    <line x1="20" y1="-54" x2="8" y2="-72"/>
    <line x1="20" y1="-54" x2="32" y2="-72"/>
    <!-- leaf dots -->
    <circle cx="-32" cy="-72" r="3" fill="#fff"/>
    <circle cx="-8" cy="-72" r="3" fill="#fff"/>
    <circle cx="8" cy="-72" r="3" fill="#fff"/>
    <circle cx="32" cy="-72" r="3" fill="#fff"/>
  </g>
</svg>
